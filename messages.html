<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
  <link rel="stylesheet" href="stylegallery.css" />
  <style>
    html {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #ff8fb8 0%, #ff5a8b 35%, #ff1f6d 70%, #b4003f 100%);
      color: #fff;
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: "Jost", sans-serif;
    }

    .fit {
      width: 40px;
      height: 30px;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.86;
    }

    .slider-container {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 32px;
      min-height: 100vh;
    }

    .button-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: min(520px, 100%);
      padding: 46px 40px;
      border-radius: 44px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 40px 90px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(20px);
      text-align: center;
      overflow: hidden;
      justify-content: center;
    }

    .button-card::before {
      content: "";
      position: absolute;
      inset: -12px;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.25), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(255, 94, 145, 0.18), transparent 32%);
      filter: blur(18px);
      opacity: 0.7;
      pointer-events: none;
    }

    .button-card > * {
      position: relative;
      z-index: 1;
    }

    .button-card h1 {
      font-size: clamp(1.95rem, 4vw, 2.8rem);
      line-height: 1.1;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.18);
      margin: 0;
      max-width: 100%;
      word-break: break-word;
    }

    .button-card p {
      margin: 0;
      font-size: 0.97rem;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.7;
      max-width: 100%;
      word-break: break-word;
    }

    .gallery-btn-group {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .button-card p {
      margin: 0;
      padding-bottom: 0.25rem;
    }

    .btn {
      background: linear-gradient(135deg, #ff71a0 0%, #ff4979 45%, #ff1e5b 100%);
      color: #fff;
      border: none;
      padding: 18px 48px;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 28px 70px rgba(255, 40, 120, 0.28);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      text-decoration: none;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 34px 88px rgba(255, 40, 120, 0.4);
      filter: saturate(1.1);
    }

    .btn:active {
      transform: translateY(0) scale(0.99);
    }
  </style>
</head>

<body>

  <div id="canvas-container"></div>

  <section class="slider-container">
    <div class="button-card">
      
      <p>HAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHAHA</p>
      <div class="gallery-btn-group">
        <a href="picture-heart.html" class="btn">♥ CLICK ME ♥</a>
      </div>
    </div>
  </section>

  <script>
    const container = document.getElementById('canvas-container');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 30;

    const x = 0, y = 0;
    const heartShape = new THREE.Shape();
    heartShape.moveTo(x + 0.5, y + 0.5);
    heartShape.bezierCurveTo(x + 0.5, y + 0.5, x + 1, y, x, y);
    heartShape.bezierCurveTo(x - 1, y, x - 1, y + 1.5, x - 1, y + 1.5);
    heartShape.bezierCurveTo(x - 1, y + 2.5, x + 0.5, y + 3.5, x + 0.5, y + 3.5);
    heartShape.bezierCurveTo(x + 0.5, y + 3.5, x + 2, y + 2.5, x + 2, y + 1.5);
    heartShape.bezierCurveTo(x + 2, y + 1.5, x + 2, y, x + 1, y);
    heartShape.bezierCurveTo(x + 0.5, y, x + 0.5, y + 0.5, x + 0.5, y + 0.5);

    const extrudeSettings = {
      depth: 0.5,
      bevelEnabled: true,
      bevelSegments: 3,
      bevelSize: 0.2,
      bevelThickness: 0.3
    };
    const heartGeometry = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);

    const hearts = [];
    const colors = [
      0xff6b6b, 0xff8e8e, 0xffb3b3, 0xffd8d8,
      0xff9e9e, 0xffc1c1, 0xff6b8e, 0xff8eb3
    ];

    for (let i = 0; i < 25; i++) {
      const material = new THREE.MeshPhongMaterial({
        color: colors[Math.floor(Math.random() * colors.length)],
        emissive: 0xff0000,
        emissiveIntensity: 0.1,
        shininess: 100,
        transparent: true,
        opacity: 0.9
      });

      const heart = new THREE.Mesh(heartGeometry, material);
      heart.position.x = (Math.random() - 0.5) * 50;
      heart.position.y = (Math.random() - 0.5) * 50;
      heart.position.z = (Math.random() - 0.5) * 50;

      const scale = Math.random() * 0.8 + 0.5;
      heart.scale.set(scale, scale, scale);

      heart.rotation.x = Math.random() * Math.PI;
      heart.rotation.y = Math.random() * Math.PI;

      heart.userData = {
        speedX: Math.random() * 0.02 - 0.01,
        speedY: Math.random() * 0.02 - 0.01,
        speedZ: Math.random() * 0.02 - 0.01,
        rotationSpeedX: Math.random() * 0.01,
        rotationSpeedY: Math.random() * 0.01,
        originalX: heart.position.x,
        originalY: heart.position.y,
        originalZ: heart.position.z,
        floatDistance: 2 + Math.random() * 3
      };

      scene.add(heart);
      hearts.push(heart);
    }

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(1, 1, 1);
    scene.add(directionalLight);

    function animate() {
      requestAnimationFrame(animate);
      hearts.forEach(heart => {
        const time = Date.now() * 0.001;
        heart.position.x = heart.userData.originalX + Math.sin(time * heart.userData.speedX * 10) * heart.userData.floatDistance;
        heart.position.y = heart.userData.originalY + Math.sin(time * heart.userData.speedY * 10) * heart.userData.floatDistance;
        heart.position.z = heart.userData.originalZ + Math.sin(time * heart.userData.speedZ * 10) * heart.userData.floatDistance;
        heart.rotation.x += heart.userData.rotationSpeedX;
        heart.rotation.y += heart.userData.rotationSpeedY;
      });
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
