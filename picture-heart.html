<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heart Picture Gallery</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #ff8fbf 0%, #ff4d85 45%, #940033 100%);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .intro {
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 4;
      padding: 0 20px;
      transition: opacity 1.6s ease;
    }

    .intro.fade-out {
      opacity: 0;
    }

    .intro h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.35);
    }

    .intro p {
      margin: 12px auto 0;
      max-width: 520px;
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .photo {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 24px;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transition: left 3s ease, top 3s ease, opacity 2s ease;
      will-change: left, top, opacity;
    }

    .photo.loaded {
      opacity: 1;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo.loop {
      animation: floaty 16s ease-in-out infinite alternate;
    }

    .photo:nth-child(3n) {
      animation-duration: 18s;
    }

    .photo:nth-child(4n) {
      animation-duration: 20s;
    }

    @keyframes floaty {
      from {
        transform: translateY(0px) rotate(0deg);
      }
      to {
        transform: translateY(-18px) rotate(2deg);
      }
    }

    .footer {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      text-align: center;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .footer a,
    .nav-btn {
      color: white;
      text-decoration: underline;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 1.7rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 22px 45px rgba(0, 0, 0, 0.18);
      font-weight: 700;
      letter-spacing: 0.06em;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.22);
    }

    @media (max-width: 768px) {
      .photo {
        width: 88px;
        height: 88px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="intro">
      <h1>i've made this only for you</h1>
      <p>Welcome — the pictures will come together into a moving heart shape as soon as the page loads.</p>
    </div>

    <div class="stage" id="stage"></div>
 
    <div class="footer">
  
      <a href="finalmessages.html" class="nav-btn">Go to Final Message</a>
    </div>

  </div>

  <script>
    const imageFiles = [
      'trix1.jpg',
      'trix2.jpg',
      'trix3.jpg',
      'trix4.jpg',
      'trix5.jpg',
      'trix6.jpg',
      'trix8.jpg',
      'trix7.jpg',
      'trix9.jpg',
      'trix10.jpg',
    ];

    const stage = document.getElementById('stage');
    const totalPhotos = 20;
    const photos = [];

    for (let i = 0; i < totalPhotos; i++) {
      const photo = document.createElement('div');
      photo.className = 'photo';
      const img = document.createElement('img');
      img.src = imageFiles[i % imageFiles.length];
      img.alt = 'heart picture';
      photo.appendChild(img);
      stage.appendChild(photo);
      photos.push(photo);
    }

    function heartCoords(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      return { x, y };
    }

    function arrangeHeart() {
      const rect = stage.getBoundingClientRect();
      const centerX = rect.width / 2;
      const centerY = rect.height / 2.2;
      const scale = Math.min(rect.width, rect.height) / 40;

      photos.forEach((photo, index) => {
        const angle = (Math.PI * 2 * index) / totalPhotos;
        const point = heartCoords(angle);
        const left = centerX + point.x * scale - photo.offsetWidth / 2;
        const top = centerY - point.y * scale - photo.offsetHeight / 2;

        photo.dataset.targetLeft = left;
        photo.dataset.targetTop = top;

        photo.style.left = `${Math.random() * (rect.width - photo.offsetWidth)}px`;
        photo.style.top = `${Math.random() * (rect.height - photo.offsetHeight)}px`;
      });

      requestAnimationFrame(() => {
        photos.forEach((photo, index) => {
          const delay = index * 120;
          setTimeout(() => {
            photo.classList.add('loaded', 'loop');
            photo.style.left = `${photo.dataset.targetLeft}px`;
            photo.style.top = `${photo.dataset.targetTop}px`;
          }, delay);
        });
      });
    }

    const intro = document.querySelector('.intro');

    window.addEventListener('load', () => {
      arrangeHeart();
      requestAnimationFrame(() => {
        setTimeout(() => intro.classList.add('fade-out'), 400);
      });
      window.addEventListener('resize', () => {
        arrangeHeart();
      });
    });
  </script>
</body>
</html>
